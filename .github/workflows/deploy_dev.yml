name: Deploy to Development Server

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GamingRewampPVTSSHKey }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server to known_hosts
        run: ssh-keyscan -H 103.189.89.203 >> ~/.ssh/known_hosts

      - name: Copy files to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.189.89.203
          username: root
          key: ${{ secrets.GamingRewampPVTSSHKey }}
          source: "."
          target: "/www/wwwroot/nodeproject"

      - name: Set execute permissions for files
        run: |
          ssh -i ~/.ssh/id_ed25519 root@103.189.89.203 "chmod -R +x /www/wwwroot/nodeproject"

      - name: Check if npm and pm2 are installed
        run: |
          ssh -i ~/.ssh/id_ed25519 root@103.189.89.203 "which npm && which pm2"

      - name: Rebuild native modules on the server
        run: |
          ssh -i ~/.ssh/id_ed25519 root@103.189.89.203 "cd /www/wwwroot/nodeproject && npm rebuild bcrypt --build-from-source"

      - name: Install dependencies and restart application
        run: |
          ssh -i ~/.ssh/id_ed25519 root@103.189.89.203 "
            cd /www/wwwroot/nodeproject && \
            npm install && \
            if pm2 describe GamingRewampDev > /dev/null; then \
              pm2 restart GamingRewampDev; \
            else \
              pm2 start app.js --name GamingRewampDev; \
            fi"